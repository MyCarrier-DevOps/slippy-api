name: Lint, Test and Security Checks
on:
  workflow_dispatch:
  push:
    paths:
      - '**'
      - '!docs/**'
      - '!.github/**'
      - '!README.md'
    branches:
      - main
  pull_request:
    paths:
      - '**'
      - '!docs/**'
      - '!.github/**'
      - '!README.md'
    branches:
      - main

env:
  GO_VERSION: '1.26'

jobs:
  unit-tests:
    name: unit-test-${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [slippy-api]
    permissions:
      contents: read
      actions: read
      pull-requests: write # needed for coverage comments
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test ${{ matrix.module }} module
        working-directory: ${{ matrix.module }}
        run: |
          go mod download
          go test -cover -coverprofile=../coverage-${{ matrix.module }}.out -covermode=atomic ./...
          go tool cover -func=../coverage-${{ matrix.module }}.out
      - name: check ${{ matrix.module }} test coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: ./coverage-${{ matrix.module }}.out
          threshold-total: 80
          source-dir: ./${{ matrix.module }}

  lint:
    name: lint-${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [slippy-api, slippy-client]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install tools
        run: make install-tools
      - name: Lint ${{ matrix.module }} module
        working-directory: ${{ matrix.module }}
        run: |
          go mod tidy
          golangci-lint run --config ../.github/.golangci.yml --timeout 5m ./...

  vuln:
    name: check-sec-${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [slippy-api]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run vulnerability scan on ${{ matrix.module }} module
        run: make check-sec PKG=${{ matrix.module }}

  # Check that all unit tests passed
  unit-tests-check:
    name: "Unit tests status check"
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    steps:
      - name: Check unit test results
        run: |
          echo "Unit tests completed"
          # This job will fail if any of the matrix unit test jobs failed
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then

            echo "Some unit tests failed"
            exit 1
          fi
          echo "All unit tests passed"

  # Check that all lint jobs passed
  lint-check:
    name: "Lint status check"
    runs-on: ubuntu-latest
    needs: lint
    if: always()
    steps:
      - name: Check lint results
        run: |
          echo "Lint jobs completed"
          # This job will fail if any of the matrix lint jobs failed
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Some lint jobs failed"
            exit 1
          fi
          echo "All lint jobs passed"

  # Check that all vulnerability scan jobs passed
  vuln-check:
    name: "Vulnerability scan status check"
    runs-on: ubuntu-latest
    needs: vuln
    if: always()
    steps:
      - name: Check vulnerability scan results
        run: |
          echo "Vulnerability scan jobs completed"
          # This job will fail if any of the matrix vuln jobs failed
          if [[ "${{ needs.vuln.result }}" != "success" ]]; then
            echo "Some vulnerability scan jobs failed"
            exit 1
          fi
          echo "All vulnerability scan jobs passed"

  # Regenerate OpenAPI spec + Go client when API code changes on main.
  # Commits the result back so the contract and client stay in sync.
  regenerate-client:
    name: "Regenerate contracts & client"
    runs-on: ubuntu-latest
    needs:
      - unit-tests-check
      - lint-check
      - vuln-check
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.unit-tests-check.result == 'success' &&
      needs.lint-check.result == 'success' &&
      needs.vuln-check.result == 'success'
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.check-diff.outputs.changed }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Get GitHub App user info
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          slug=$(gh api /user --jq .login)
          id=$(gh api /user --jq .id)
          echo "name=${slug}" >> "$GITHUB_OUTPUT"
          echo "email=${id}+${slug}@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Regenerate spec and client
        run: make generate-client

      - name: Check for changes
        id: check-diff
        run: |
          if git diff --quiet slippy-api/api/ slippy-client/; then
            echo "No contract or client changes detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Contract or client changes detected"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit regenerated files
        if: steps.check-diff.outputs.changed == 'true'
        run: |
          git config user.name "${{ steps.app-user.outputs.name }}"
          git config user.email "${{ steps.app-user.outputs.email }}"
          git add slippy-api/api/ slippy-client/client.gen.go slippy-client/go.mod slippy-client/go.sum
          git commit -m "chore: regenerate API contracts and Go client [skip ci]"
          git push

  # Tag and release slippy-client when contracts were regenerated with changes
  release-client:
    name: "Release slippy-client"
    runs-on: ubuntu-latest
    needs:
      - regenerate-client
    if: needs.regenerate-client.outputs.changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: '6.0.x'

      - name: Calculate Version
        id: calculate_version
        uses: gittools/actions/gitversion/execute@v3.1.11
        with:
          useConfigFile: true
          disableCache: true
          configFilePath: .github/Gitversion.yml

      - name: Create and push tag
        env:
          VERSION: ${{ steps.calculate_version.outputs.majorMinorPatch }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          TAG="slippy-client/v$VERSION"
          echo "Creating tag $TAG"
          git tag -a "$TAG" -m "Release slippy-client v$VERSION"
          git push origin "$TAG"

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: slippy-client/v${{ steps.calculate_version.outputs.majorMinorPatch }}
          release_name: slippy-client v${{ steps.calculate_version.outputs.majorMinorPatch }}
          body: |
            ## slippy-client v${{ steps.calculate_version.outputs.majorMinorPatch }}

            Generated Go client for the Slippy API v1 endpoints.

            ### Installation

            ```bash
            go get github.com/MyCarrier-DevOps/slippy-api/slippy-client@v${{ steps.calculate_version.outputs.majorMinorPatch }}
            ```

            ### Documentation

            [pkg.go.dev](https://pkg.go.dev/github.com/MyCarrier-DevOps/slippy-api/slippy-client@v${{ steps.calculate_version.outputs.majorMinorPatch }})
          draft: false
          prerelease: false

      - name: Refresh pkg.go.dev cache
        env:
          VERSION: ${{ steps.calculate_version.outputs.majorMinorPatch }}
        run: |
          echo "Requesting pkg.go.dev refresh for slippy-client/v$VERSION"
          curl -s "https://proxy.golang.org/github.com/!my!carrier-!dev!ops/slippy-api/slippy-client/@v/v$VERSION.info" || true
          sleep 2
          curl -s "https://pkg.go.dev/github.com/MyCarrier-DevOps/slippy-api/slippy-client@v$VERSION" > /dev/null || true
          echo "pkg.go.dev refresh completed"